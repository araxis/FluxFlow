name: package maintenance

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: "Package id to update"
        required: true
        type: string
      versions:
        description: "Comma-separated package versions"
        required: true
        type: string
      dry_run:
        description: "Print planned changes without applying them"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  unlist:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: 10.0.x

      - name: Unlist package versions
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          INPUT_PACKAGE_ID: ${{ inputs.package_id }}
          INPUT_VERSIONS: ${{ inputs.versions }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw "Add the package feed repository secret before package maintenance."
          }

          $packageId = "$env:INPUT_PACKAGE_ID".Trim()
          if ([string]::IsNullOrWhiteSpace($packageId)) {
            throw "Package id is required."
          }

          if (-not $packageId.StartsWith("FluxFlow.", [StringComparison]::Ordinal)) {
            throw "Package id '$packageId' is outside the allowed package family."
          }

          $versions = @("$env:INPUT_VERSIONS".Split(",", [StringSplitOptions]::RemoveEmptyEntries) |
            ForEach-Object { $_.Trim() } |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) })

          if ($versions.Count -eq 0) {
            throw "At least one package version is required."
          }

          foreach ($version in $versions) {
            if ($version -notmatch "^\d+\.\d+\.\d+(?:-[0-9A-Za-z][0-9A-Za-z.-]*)?$") {
              throw "Package version '$version' is not a valid semantic version."
            }

            if ($env:INPUT_DRY_RUN -eq "true") {
              Write-Host "Would unlist $packageId $version."
              continue
            }

            dotnet nuget delete $packageId $version `
              --api-key $env:NUGET_API_KEY `
              --source "https://api.nuget.org/v3/index.json" `
              --non-interactive
          }
