name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version, for example 0.1.0-alpha.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Resolve release version
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}"
            if ($version.StartsWith("v")) {
              $version = $version.Substring(1)
            }
          }

          if ($version -notmatch "^\d+\.\d+\.\d+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$") {
            throw "Invalid package version '$version'."
          }

          $tag = "v$version"
          $isPrerelease = $version.Contains("-")

          "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append
          "IS_PRERELEASE=$isPrerelease" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Restore
        run: dotnet restore FluxFlow.sln

      - name: Build
        run: dotnet build FluxFlow.sln --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test FluxFlow.sln --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/FluxFlow.Engine/FluxFlow.Engine.csproj --configuration Release --no-build -p:PackageVersion=${{ env.PACKAGE_VERSION }} --output artifacts/packages

      - name: Prepare release notes
        shell: pwsh
        run: ./eng/get-release-notes.ps1 -Version "${{ env.PACKAGE_VERSION }}" -OutputPath artifacts/release-notes.md

      - name: Upload workflow package artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: fluxflow-engine-${{ env.PACKAGE_VERSION }}
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
            artifacts/release-notes.md
          if-no-files-found: error

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ env.RELEASE_TAG }}"
          $notesPath = "artifacts/release-notes.md"
          $files = Get-ChildItem -LiteralPath "artifacts/packages" -File |
            Where-Object { $_.Extension -in ".nupkg", ".snupkg" } |
            Sort-Object Name

          if ($files.Count -eq 0) {
            throw "No package files were found for GitHub Release upload."
          }

          $uploadArgs = @($tag) + @($files.FullName) + @("--clobber")
          $releaseExists = $true
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            $releaseExists = $false
          }

          if ($releaseExists) {
            gh release upload @uploadArgs
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to upload assets to GitHub Release '$tag'."
            }

            $editArgs = @(
              "release",
              "edit",
              $tag,
              "--title",
              $tag,
              "--notes-file",
              $notesPath,
              "--target",
              "${{ github.sha }}"
            )
            if ("${{ env.IS_PRERELEASE }}" -eq "True") {
              $editArgs += "--prerelease"
            }

            gh @editArgs
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to update GitHub Release '$tag'."
            }
            return
          }

          $createArgs = @(
            "release",
            "create",
            $tag
          ) + @($files.FullName) + @(
            "--title",
            $tag,
            "--notes-file",
            $notesPath,
            "--target",
            "${{ github.sha }}"
          )

          if ("${{ env.IS_PRERELEASE }}" -eq "True") {
            $createArgs += "--prerelease"
          }

          gh @createArgs
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to create GitHub Release '$tag'."
          }

      - name: Publish NuGet packages
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw "Add the NUGET_API_KEY repository secret before publishing."
          }

          dotnet nuget push "artifacts/packages/*.nupkg" --api-key $env:NUGET_API_KEY --source "https://api.nuget.org/v3/index.json" --skip-duplicate
          dotnet nuget push "artifacts/packages/*.snupkg" --api-key $env:NUGET_API_KEY --source "https://api.nuget.org/v3/index.json" --skip-duplicate
