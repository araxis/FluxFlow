name: release

on:
  push:
    tags:
      - "*-v*.*.*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package alias or id, for example engine or components-mqtt"
        required: true
        type: string
      version:
        description: "Optional package version. Defaults to the project version."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Resolve release package
        shell: pwsh
        env:
          INPUT_PACKAGE: ${{ inputs.package }}
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          ./eng/resolve-package-release.ps1 `
            -Package "$env:INPUT_PACKAGE" `
            -Version "$env:INPUT_VERSION" `
            -RefName "$env:REF_NAME" `
            -EnvironmentPath $env:GITHUB_ENV

      - name: Restore
        run: dotnet restore FluxFlow.sln

      - name: Build
        run: dotnet build FluxFlow.sln --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test FluxFlow.sln --configuration Release --no-build

      - name: Pack
        shell: pwsh
        run: dotnet pack "$env:PACKAGE_PROJECT" --configuration Release --no-build --output artifacts/packages

      - name: Inspect package archive
        shell: pwsh
        run: ./eng/package-archive-inspect.ps1 -PackageId "$env:PACKAGE_ID" -Version "$env:PACKAGE_VERSION" -PackageSource artifacts/packages

      - name: Smoke package consumer
        shell: pwsh
        run: ./eng/package-consumer-smoke.ps1 -PackageId "$env:PACKAGE_ID" -Version "$env:PACKAGE_VERSION" -PackageSource artifacts/packages

      - name: Prepare release notes
        shell: pwsh
        run: ./eng/get-release-notes.ps1 -PackageName "$env:PACKAGE_ID" -Version "$env:PACKAGE_VERSION" -OutputPath artifacts/release-notes.md

      - name: Upload workflow package artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ env.PACKAGE_ALIAS }}-${{ env.PACKAGE_VERSION }}
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
            artifacts/release-notes.md
          if-no-files-found: error

      - name: Create release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:RELEASE_TAG
          $releaseTitle = "$env:PACKAGE_ID $env:PACKAGE_VERSION"
          $notesPath = "artifacts/release-notes.md"
          $files = Get-ChildItem -LiteralPath "artifacts/packages" -File |
            Where-Object { $_.Extension -in ".nupkg", ".snupkg" } |
            Sort-Object Name

          if ($files.Count -eq 0) {
            throw "No package files were found for release upload."
          }

          $uploadArgs = @($tag) + @($files.FullName) + @("--clobber")
          $releaseExists = $true
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            $releaseExists = $false
          }

          if ($releaseExists) {
            gh release upload @uploadArgs
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to upload assets to release '$tag'."
            }

            $editArgs = @(
              "release",
              "edit",
              $tag,
              "--title",
              $releaseTitle,
              "--notes-file",
              $notesPath,
              "--target",
              $env:GITHUB_SHA
            )
            if ($env:IS_PRERELEASE -eq "True") {
              $editArgs += "--prerelease"
            }

            gh @editArgs
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to update release '$tag'."
            }
            return
          }

          $createArgs = @(
            "release",
            "create",
            $tag
          ) + @($files.FullName) + @(
            "--title",
            $releaseTitle,
            "--notes-file",
            $notesPath,
            "--target",
            $env:GITHUB_SHA
          )

          if ($env:IS_PRERELEASE -eq "True") {
            $createArgs += "--prerelease"
          }

          gh @createArgs
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to create release '$tag'."
          }

      - name: Publish package
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw "Add the package feed repository secret before publishing."
          }

          dotnet nuget push "artifacts/packages/*.nupkg" --api-key $env:NUGET_API_KEY --source "https://api.nuget.org/v3/index.json" --skip-duplicate

      - name: Verify package feed
        shell: pwsh
        run: |
          ./eng/package-feed-verify.ps1 `
            -PackageId "$env:PACKAGE_ID" `
            -Version "$env:PACKAGE_VERSION" `
            -PackageSource "https://api.nuget.org/v3/index.json" `
            -IndexAttempts 60 `
            -IndexDelaySeconds 15 `
            -Attempts 20 `
            -DelaySeconds 15
